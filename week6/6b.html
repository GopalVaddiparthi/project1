<!DOCTYPE html>
<html>
<head>
<title>My Gaming Store</title>
<style>
body{
    margin:0;
    font-family:Arial;
    color:#fff;
    background:url("backgroundimages.jpg") center/cover fixed no-repeat;
}

/* Dark overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    z-index:-1;
}

/* GRID */
.container{
    display:grid;
    grid-template:
        "header header" auto
        "sale sale" auto
        "sidebar main" 1fr
        "footer footer" auto /220px 1fr;
    gap:15px;
    padding:15px;
}

/* COMMON STYLE */
.header,.sale,.sidebar,.main,.footer{
    background:rgba(40,40,40,.65);
    border-radius:12px;
    padding:15px;
    box-shadow:0 0 15px #000;
}

/* HEADER */
.header{
    grid-area:header;
    text-align:center;
    font-size:28px;
    letter-spacing:3px;
}

/* SALE ANIMATION */
.sale{
    grid-area:sale;
    overflow:hidden;
    white-space:nowrap;
    height:40px;
    position:relative;
}

.sale p{
    position:absolute;
    color:#00ffd5;
    font-size:20px;
    animation:move 10s linear infinite;
}

@keyframes move{
    from{left:-100%;}
    to{left:100%;}
}

/* SIDEBAR */
.sidebar{
    grid-area:sidebar;
}

.sidebar ul{
    list-style:none;
    padding:0;
}

.sidebar li{
    margin:15px 0;
}

.sidebar a{
    color:#fff;
    text-decoration:none;
    font-size:18px;
    transition:.3s;
}

.sidebar a:hover{
    color:#00ffd5;
    padding-left:8px;
}

/* MAIN */
.main{
    grid-area:main;
}

iframe{
    width:100%;
    height:520px;
    border:0;
    background:rgba(0,0,0,.5);
    border-radius:10px;
}

/* FOOTER */
.footer{
    grid-area:footer;
    text-align:center;
    font-size:14px;
    opacity:.85;
}
</style>
</head>

<body>

<div class="container">

<div class="header">My Gaming Paradise</div>

<div class="sale">
<p>BIG SALE 46% OFF</p>
</div>

<div class="sidebar">
<h2>Categories</h2>
<ul>
<li><a href="Forza Horizon 5.html" target="contentFrame">Forza Horizon 5</a></li>
<li><a href="John Wick.html" target="contentFrame">John Wick</a></li>
<li><a href="Resident Evil 9.html" target="contentFrame">Resident Evil 9</a></li>
<li><a href="Black Myth Wukong.html" target="contentFrame">Black Myth Wukong</a></li>
</ul>
</div>

<div class="main">
<iframe name="contentFrame"></iframe>
</div>

<div class="footer">
The Gaming Paradise
</div>

</div>

</body>
</html>
